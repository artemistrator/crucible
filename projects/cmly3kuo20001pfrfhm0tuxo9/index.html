<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App: Kanban & Calendar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (Core + Persist) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.13.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    
    <!-- Корневой компонент -->
    <div x-data="todoApp()" x-cloak class="min-h-screen flex flex-col">
        
        <!-- Навигация / Header -->
        <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold text-gray-900 tracking-tight">Todo App</h1>
                    </div>
                    
                    <!-- View Switcher -->
                    <div class="flex items-center space-x-2 bg-gray-100 p-1 rounded-lg">
                        <button @click="currentView = 'kanban'" 
                                :class="currentView === 'kanban' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-700'"
                                class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200">
                            Kanban
                        </button>
                        <button @click="currentView = 'calendar'" 
                                :class="currentView === 'calendar' ? 'bg-white text-blue-600 shadow' : 'text-gray-500 hover:text-gray-700'"
                                class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200">
                            Calendar
                        </button>
                    </div>

                    <!-- Add Task Button -->
                    <div class="flex items-center">
                        <button @click="openModal = true" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                            </svg>
                            Новая задача
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Основной контент -->
        <main class="flex-grow p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto w-full">
            
            <!-- VIEW: KANBAN -->
            <div x-show="currentView === 'kanban'" 
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 class="h-full flex flex-col md:flex-row gap-6 overflow-x-auto pb-4">
                
                <!-- Колонки генерируются через x-for по статусам -->
                <template x-for="status in columns" :key="status.id">
                    <div class="flex-1 min-w-[300px] bg-gray-100 rounded-xl flex flex-col max-h-[calc(100vh-140px)]"
                         @dragover.prevent 
                         @drop="dropTask(status.id)"
                         @dragenter="$el.classList.add('bg-blue-50')"
                         @dragleave="$el.classList.remove('bg-blue-50')">
                        
                        <!-- Заголовок колонки -->
                        <div class="p-4 flex justify-between items-center border-b border-gray-200/50">
                            <h2 class="font-bold text-gray-700 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full" :class="status.colorClass"></span>
                                <span x-text="status.label"></span>
                                <span class="bg-gray-200 text-gray-600 text-xs px-2 py-0.5 rounded-full" x-text="tasks.filter(t => t.status === status.id).length"></span>
                            </h2>
                        </div>

                        <!-- Список задач -->
                        <div class="p-3 space-y-3 overflow-y-auto custom-scrollbar flex-grow">
                            <template x-for="task in tasks.filter(t => t.status === status.id)" :key="task.id">
                                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow group relative"
                                     draggable="true"
                                     @dragstart="draggedTask = task; $el.classList.add('opacity-50')"
                                     @dragend="$el.classList.remove('opacity-50'); draggedTask = null">
                                    
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="font-medium text-gray-800" x-text="task.title"></h3>
                                        <!-- Priority Badge -->
                                        <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded border"
                                              :class="{
                                                  'bg-red-50 text-red-600 border-red-100': task.priority === 'high',
                                                  'bg-yellow-50 text-yellow-600 border-yellow-100': task.priority === 'medium',
                                                  'bg-gray-50 text-gray-600 border-gray-100': task.priority === 'low'
                                              }" x-text="task.priority">
                                        </span>
                                    </div>
                                    
                                    <div class="flex items-center gap-2 text-xs text-gray-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                        </svg>
                                        <span x-text="formatDate(task.date)"></span>
                                    </div>

                                    <!-- Альтернативное управление (стрелки) для мобильных/удобства -->
                                    <div class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button @click.stop="moveTask(task.id, -1)" class="p-1 bg-gray-200 rounded hover:bg-gray-300" title="Previous Status">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                        </button>
                                        <button @click.stop="moveTask(task.id, 1)" class="p-1 bg-gray-200 rounded hover:bg-gray-300" title="Next Status">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            </template>
                            
                            <!-- Плейсхолдер если пусто -->
                            <div x-show="tasks.filter(t => t.status === status.id).length === 0" class="text-center py-8 text-gray-400 text-sm italic border-2 border-dashed border-gray-200 rounded-lg">
                                No tasks here
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- VIEW: CALENDAR -->
            <div x-show="currentView === 'calendar'"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 class="h-full flex flex-col">
                
                <!-- Календарь контролы -->
                <div class="flex justify-between items-center mb-4">
                    <button @click="changeMonth(-1)" class="p-2 hover:bg-gray-200 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <h2 class="text-xl font-bold text-gray-800" x-text="currentMonthLabel"></h2>
                    <button @click="changeMonth(1)" class="p-2 hover:bg-gray-200 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <!-- Сетка календаря -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex-grow">
                    <!-- Шапка дней недели -->
                    <div class="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                        <template x-for="day in daysHeader">
                            <div class="py-2 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider" x-text="day"></div>
                        </template>
                    </div>
                    
                    <!-- Ячейки дней -->
                    <div class="grid grid-cols-7 auto-rows-fr flex-grow">
                        <template x-for="dateObj in calendarDays">
                            <div class="min-h-[100px] border-r border-b border-gray-100 p-2 group hover:bg-blue-50/50 transition-colors">
                                <div class="flex justify-between items-start">
                                    <span :class="{'text-gray-900 font-bold': !dateObj.isOtherMonth, 'text-gray-300': dateObj.isOtherMonth}" x-text="dateObj.dayNumber"></span>
                                    <button @click="openModalForDate(dateObj.fullDate)" class="opacity-0 group-hover:opacity-100 text-blue-500 hover:bg-blue-100 rounded p-0.5 transition-all">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </div>
                                
                                <!-- Список задач в дне -->
                                <div class="mt-1 space-y-1">
                                    <template x-for="task in getTasksForDate(dateObj.fullDate)">
                                        <div class="text-[10px] sm:text-xs p-1 rounded truncate cursor-pointer border-l-2 shadow-sm"
                                             :class="{
                                                 'bg-blue-50 text-blue-800 border-blue-500': task.status === 'todo',
                                                 'bg-yellow-50 text-yellow-800 border-yellow-500': task.status === 'in-progress',
                                                 'bg-green-50 text-green-800 border-green-500': task.status === 'done'
                                             }"
                                             x-text="task.title"
                                             @click="editTask(task)">
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

        </main>

        <!-- Модальное окно -->
        <div x-show="openModal" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <!-- Background overlay -->
                <div x-show="openModal" 
                     x-transition:enter="ease-out duration-300" 
                     x-transition:enter-start="opacity-0" 
                     x-transition:enter-end="opacity-100" 
                     x-transition:leave="ease-in duration-200" 
                     x-transition:leave-start="opacity-100" 
                     x-transition:leave-end="opacity-0"
                     class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="openModal = false"></div>

                <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

                <!-- Modal panel -->
                <div x-show="openModal"
                     x-transition:enter="ease-out duration-300"
                     x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                     x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                     x-transition:leave="ease-in duration-200"
                     x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                     x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                     class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                    
                    <form @submit.prevent="saveTask">
                        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                            <div class="sm:flex sm:items-start w-full">
                                <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                                        <span x-text="editingTask ? 'Редактировать задачу' : 'Новая задача'"></span>
                                    </h3>
                                    <div class="mt-4 space-y-4">
                                        <div>
                                            <label for="title" class="block text-sm font-medium text-gray-700">Название</label>
                                            <input type="text" id="title" x-model="newTask.title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                        </div>
                                        
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label for="date" class="block text-sm font-medium text-gray-700">Дата</label>
                                                <input type="date" id="date" x-model="newTask.date" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                            </div>
                                            <div>
                                                <label for="priority" class="block text-sm font-medium text-gray-700">Приоритет</label>
                                                <select id="priority" x-model="newTask.priority" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                                    <option value="low">Низкий</option>
                                                    <option value="medium">Средний</option>
                                                    <option value="high">Высокий</option>
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <label for="status" class="block text-sm font-medium text-gray-700">Статус</label>
                                            <div class="mt-2 flex space-x-4">
                                                <template x-for="col in columns">
                                                    <label class="inline-flex items-center">
                                                        <input type="radio" :value="col.id" x-model="newTask.status" class="form-radio h-4 w-4 text-blue-600">
                                                        <span class="ml-2" x-text="col.label"></span>
                                                    </label>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                            <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm">
                                Сохранить
                            </button>
                            <button type="button" @click="openModal = false; resetForm()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                                Отмена
                            </button>
                            <button type="button" x-show="editingTask" @click="deleteTask" class="mt-3 sm:mt-0 mr-auto text-red-600 hover:text-red-800 font-medium text-sm">
                                Удалить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script>
        function todoApp() {
            return {
                currentView: Alpine.$persist('kanban').as('view'),
                draggedTask: null,
                openModal: false,
                editingTask: null,
                newTask: { title: '', date: new Date().toISOString().split('T')[0], priority: 'medium', status: 'todo' },
                
                // Данные, сохраняемые в LocalStorage
                tasks: Alpine.$persist([
                    { id: 1715420000000, title: 'Спланировать неделю', status: 'todo', date: new Date().toISOString().split('T')[0], priority: 'high' },
                    { id: 1715420000001, title: 'Купи продукты', status: 'in-progress', date: new Date().toISOString().split('T')[0], priority: 'medium' },
                    { id: 1715420000002, title: 'Позвонить маме', status: 'done', date: new Date(Date.now() - 86400000).toISOString().split('T')[0], priority: 'low' }
                ]).as('tasks'),

                columns: [
                    { id: 'todo', label: 'Нужно сделать', colorClass: 'bg-slate-400' },
                    { id: 'in-progress', label: 'В работе', colorClass: 'bg-blue-400' },
                    { id: 'done', label: 'Готово', colorClass: 'bg-green-400' }
                ],

                daysHeader: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
                
                // Calendar State
                currentMonth: new Date().getMonth(),
                currentYear: new Date().getFullYear(),

                get currentMonthLabel() {
                    const date = new Date(this.currentYear, this.currentMonth);
                    return date.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
                },

                // Генерация дней календаря
                get calendarDays() {
                    const date = new Date(this.currentYear, this.currentMonth, 1);
                    const daysInMonth = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
                    
                    // День недели первого дня месяца (1-7, Пн=1)
                    let startDay = date.getDay(); 
                    startDay = startDay === 0 ? 7 : startDay; // Воскресенье (0) делаем 7

                    const days = [];

                    // Дни предыдущего месяца для заполнения пустот
                    const prevMonthDays = new Date(this.currentYear, this.currentMonth, 0).getDate();
                    for (let i = startDay - 1; i > 0; i--) {
                        const d = new Date(this.currentYear, this.currentMonth - 1, prevMonthDays - i + 1);
                        days.push({
                            dayNumber: d.getDate(),
                            fullDate: d.toISOString().split('T')[0],
                            isOtherMonth: true
                        });
                    }

                    // Дни текущего месяца
                    for (let i = 1; i <= daysInMonth; i++) {
                        const d = new Date(this.currentYear, this.currentMonth, i);
                        days.push({
                            dayNumber: i,
                            fullDate: d.toISOString().split('T')[0],
                            isOtherMonth: false
                        });
                    }

                    // Дни следующего месяца (чтобы заполнить сетку до 42 или 35 ячеек)
                    const remainingCells = 42 - days.length; // 6 недель * 7 дней
                    for (let i = 1; i <= remainingCells; i++) {
                        const d = new Date(this.currentYear, this.currentMonth + 1, i);
                        days.push({
                            dayNumber: d.getDate(),
                            fullDate: d.toISOString().split('T')[0],
                            isOtherMonth: true
                        });
                    }

                    return days;
                },

                // Actions
                changeMonth(offset) {
                    let newMonth = this.currentMonth + offset;
                    if (newMonth > 11) {
                        newMonth = 0;
                        this.currentYear++;
                    } else if (newMonth < 0) {
                        newMonth = 11;
                        this.currentYear--;
                    }
                    this.currentMonth = newMonth;
                },

                getTasksForDate(dateStr) {
                    return this.tasks.filter(t => t.date === dateStr);
                },

                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const [y, m, d] = dateStr.split('-');
                    return `${d}.${m}.${y}`;
                },

                // Modal & Task Management
                resetForm() {
                    this.newTask = { title: '', date: new Date().toISOString().split('T')[0], priority: 'medium', status: 'todo' };
                    this.editingTask = null;
                },

                openModalForDate(dateStr) {
                    this.resetForm();
                    this.newTask.date = dateStr;
                    this.openModal = true;
                },

                editTask(task) {
                    this.editingTask = task;
                    this.newTask = { ...task };
                    this.openModal = true;
                },

                saveTask() {
                    if (this.editingTask) {
                        // Update existing
                        const index = this.tasks.findIndex(t => t.id === this.editingTask.id);
                        if (index !== -1) {
                            this.tasks[index] = { ...this.newTask, id: this.editingTask.id };
                        }
                    } else {
                        // Create new
                        this.tasks.push({
                            id: Date.now(),
                            ...this.newTask
                        });
                    }
                    this.openModal = false;
                    this.resetForm();
                },

                deleteTask() {
                    if (this.editingTask) {
                        this.tasks = this.tasks.filter(t => t.id !== this.editingTask.id);
                        this.openModal = false;
                        this.resetForm();
                    }
                },

                // Drag and Drop
                dropTask(status) {
                    if (this.draggedTask) {
                        this.draggedTask.status = status;
                        this.draggedTask = null;
                    }
                },

                moveTask(taskId, direction) {
                    const task = this.tasks.find(t => t.id === taskId);
                    if (!task) return;
                    
                    const statusList = ['todo', 'in-progress', 'done'];
                    const currentIndex = statusList.indexOf(task.status);
                    const newIndex = currentIndex + direction;
                    
                    if (newIndex >= 0 && newIndex < statusList.length) {
                        task.status = statusList[newIndex];
                    }
                }
            }
        }
    </script>
</body>
</html>
