<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport for iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="description" content="A simple iOS-style ToDo PWA">
    
    <title>My ToDo PWA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Add to home screen icon (fallback) -->
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/icon192/192/192">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tasks</h1>
        </header>
        <ul id="todo-list" class="todo-list">
            <!-- Items injected via JS -->
        </ul>
        <form id="add-form" class="input-area">
            <input type="text" id="todo-input" placeholder="New Task..." autocomplete="off">
            <button type="submit" aria-label="Add Task">+</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
